<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Próximas Canciones - Puerto Chopp</title>
  <link rel="icon" href="favicon.png">
  <link rel="stylesheet" href="styles/main.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" />
  <style>
    body {
      background: #000;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
      padding: 0;
      margin: 0;
    }

    .main-layout {
      display: flex;
      height: 100vh;
      width: 100vw;
    }

    /* Sección Izquierda: Ahora Cantando */
    .now-playing-panel {
      flex: 1.2;
      background: linear-gradient(135deg, #0a0a0b 0%, #1a1a1c 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 4rem;
      border-right: 2px solid var(--primary-color);
      position: relative;
      overflow: hidden;
    }

    .now-playing-panel::before {
      content: "";
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(255, 204, 0, 0.05) 0%, transparent 70%);
      z-index: 1;
    }

    .now-playing-panel > * {
      position: relative;
      z-index: 2;
    }

    .status-label {
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--primary-color);
      text-transform: uppercase;
      letter-spacing: 5px;
      margin-bottom: 3rem;
      opacity: 0.8;
    }

    .current-singer {
      font-size: 6rem;
      font-weight: 800;
      color: #fff;
      margin-bottom: 2rem;
      line-height: 1.1;
      text-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    .divider {
      width: 120px;
      height: 4px;
      background: var(--primary-color);
      margin-bottom: 2.5rem;
      border-radius: 2px;
    }

    .current-song-container {
      display: flex;
      align-items: center;
      gap: 1.5rem;
      color: var(--text-light);
    }

    .current-song-container span {
      font-size: 3.5rem;
      color: var(--primary-color);
    }

    .current-song-info {
      text-align: left;
    }

    .current-song-title {
      font-size: 2.5rem;
      font-weight: 600;
      margin-bottom: 0.2rem;
    }

    .current-song-artist {
      font-size: 1.5rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    /* Sección Derecha: En Cola */
    .upcoming-panel {
      flex: 1;
      background: #0a0a0b;
      display: flex;
      flex-direction: column;
      padding: 3rem;
    }

    .upcoming-title {
      font-size: 2rem;
      font-weight: 800;
      color: #fff;
      text-align: center;
      margin-bottom: 3rem;
      text-transform: uppercase;
      letter-spacing: 3px;
    }

    .queue-list-full {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      overflow-y: auto;
      flex: 1;
      padding-right: 10px;
    }

    .queue-item-full {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.05);
      padding: 1.2rem 1.5rem;
      border-radius: 16px;
      display: flex;
      align-items: center;
      gap: 1.2rem;
      transition: all 0.3s ease;
    }

    .queue-index {
      width: 50px;
      height: 50px;
      background: var(--primary-color);
      color: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 12px;
      font-size: 1.5rem;
      font-weight: 800;
    }

    .queue-info {
      flex: 1;
    }

    .queue-singer-name {
      font-size: 1.3rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: 0.2rem;
    }

    .queue-song-details {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--text-muted);
      font-size: 1rem;
    }

    .queue-song-details span {
      font-size: 1.1rem;
      color: var(--primary-color);
    }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      opacity: 0.2;
      text-align: center;
    }

    /* Hide Scrollbar */
    .queue-list-full::-webkit-scrollbar { width: 0; }
  </style>
</head>

<body>
  <div class="main-layout">
    <!-- Panel Izquierdo: Cantando Ahora -->
    <div class="now-playing-panel" id="now-playing-panel">
      <div id="active-now" class="hidden">
        <p class="status-label">Cantando Ahora</p>
        <h1 class="current-singer" id="current-singer-name">---</h1>
        <div class="divider"></div>
        <div class="current-song-container">
          <span class="material-symbols-rounded">music_note</span>
          <div class="current-song-info">
            <p class="current-song-title" id="current-song-title">---</p>
            <p class="current-song-artist" id="current-song-artist">Cargando...</p>
          </div>
        </div>
      </div>
      
      <div id="idle-now" class="empty-state">
        <img src="assets/logo.jpg" alt="Logo" style="width: 200px; height: 200px; border-radius: 50%; border: 4px solid var(--primary-color); margin-bottom: 2rem;">
        <h1 style="font-size: 3rem; color: #fff;">Puerto Chopp</h1>
        <p style="font-size: 1.5rem; color: var(--text-muted);">Karaoke en espera</p>
      </div>
    </div>

    <!-- Panel Derecho: En Cola -->
    <div class="upcoming-panel">
      <h2 class="upcoming-title">En Cola</h2>
      <div id="queue-container" class="queue-list-full">
        <!-- Dinámico -->
      </div>
      <div id="empty-queue-msg" class="empty-state hidden">
        <span class="material-symbols-rounded" style="font-size: 5rem; margin-bottom: 1rem;">playlist_remove</span>
        <h2>Lista vacía</h2>
      </div>
    </div>
  </div>

  <script>
    document.write('<script src="' + window.djConfig.serverUrl + '/socket.io/socket.io.js"></' + 'script>');
  </script>
  <script src="js/queue.js"></script>
</body>

</html>
