<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Próximas Canciones - Puerto Chopp</title>
  <link rel="icon" href="favicon.png">
  <link rel="stylesheet" href="styles/main.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" />
  <style>
    body {
      background: #000;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
      padding: 0;
      margin: 0;
    }

    .main-layout {
      display: flex;
      height: 100vh;
      width: 100vw;
    }

    /* Portrait / tablets vertical */
    @media (orientation: portrait) {
      .main-layout {
        flex-direction: column;
      }

      .upcoming-panel {
        flex: 1;
        padding: 1rem 1.5rem;
      }

      .upcoming-title {
        font-size: 1rem;
        margin-bottom: 0.8rem;
        letter-spacing: 2px;
      }

      .queue-item-full {
        padding: 0.5rem 0.8rem;
        gap: 0.8rem;
      }

      .queue-index {
        width: 28px;
        height: 28px;
        font-size: 0.9rem;
        border-radius: 8px;
      }

      .queue-song-details {
        font-size: 0.8rem;
      }

      .queue-song-details span {
        font-size: 0.9rem;
      }

      .queue-list-full {
        gap: 0.5rem;
      }
    }

    /* Sección: En Cola */
    .upcoming-panel {
      flex: 1;
      background: #0a0a0b;
      display: flex;
      flex-direction: column;
      padding: 3rem;
    }

    .upcoming-title {
      font-size: 2rem;
      font-weight: 800;
      color: #fff;
      text-align: center;
      margin-bottom: 3rem;
      text-transform: uppercase;
      letter-spacing: 3px;
    }

    .queue-list-full {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      overflow-y: auto;
      flex: 1;
      padding-right: 10px;
    }

    .queue-item-full {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.05);
      padding: 1.2rem 1.5rem;
      border-radius: 16px;
      display: flex;
      align-items: center;
      gap: 1.2rem;
      transition: all 0.3s ease;
    }

    .queue-index {
      width: 50px;
      height: 50px;
      background: var(--primary-color);
      color: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 12px;
      font-size: 1.5rem;
      font-weight: 800;
    }

    .queue-info {
      flex: 1;
    }

    .queue-song-details {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--text-muted);
      font-size: 1rem;
    }

    .queue-song-details span {
      font-size: 1.1rem;
      color: var(--primary-color);
    }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      opacity: 0.2;
      text-align: center;
    }

    /* Hide Scrollbar */
    .queue-list-full::-webkit-scrollbar { width: 0; }
  </style>
</head>

<body>
  <div class="main-layout">
    <div class="upcoming-panel">
      <h2 class="upcoming-title">En Cola</h2>
      <div id="queue-container" class="queue-list-full">
        <!-- Dinámico -->
      </div>
      <div id="empty-queue-msg" class="empty-state">
        <span class="material-symbols-rounded" style="font-size: 5rem; margin-bottom: 1rem;">playlist_remove</span>
        <h2>Lista vacía</h2>
      </div>
    </div>
  </div>

  <script>
    document.write('<script src="' + window.djConfig.serverUrl + '/socket.io/socket.io.js"></' + 'script>');
  </script>
  <script src="js/queue.js"></script>
</body>

</html>
